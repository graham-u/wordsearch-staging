<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>Word Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <button id="btn-settings" aria-label="Settings">
      <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.49.49 0 00-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1112 8.4a3.6 3.6 0 010 7.2z"/></svg>
    </button>
    <h1>Word Search</h1>
    <div id="level-indicator">Puzzle 1</div>
    <div id="theme-indicator"></div>
  </header>

  <div id="word-list"></div>

  <div id="grid-container">
    <div id="grid-wrapper">
      <div id="grid" aria-label="Word search grid"></div>
    </div>
  </div>

  <nav id="nav-bar">
    <button id="btn-prev" disabled>Previous</button>
    <button id="btn-next">Next Puzzle</button>
  </nav>

  <div id="overlay">
    <div class="message">
      <h2>Well Done!</h2>
      <p>Loading next puzzle...</p>
    </div>
  </div>

  <div id="confirm-dialog" class="dialog-backdrop" role="dialog" aria-modal="true">
    <div class="dialog-box">
      <p id="confirm-message">Leave this puzzle?</p>
      <div class="dialog-buttons">
        <button id="confirm-no">Cancel</button>
        <button id="confirm-yes">OK</button>
      </div>
    </div>
  </div>

  <div id="settings-dialog" class="dialog-backdrop" role="dialog" aria-modal="true">
    <div class="dialog-box">
      <h3>Grid Size</h3>
      <div id="size-options">
        <button class="size-btn" data-size="6">6×6</button>
        <button class="size-btn" data-size="7">7×7</button>
        <button class="size-btn selected" data-size="8">8×8</button>
      </div>
      <div class="dialog-buttons">
        <button id="settings-cancel">Cancel</button>
        <button id="settings-ok">OK</button>
      </div>
    </div>
  </div>

  <button id="btn-update">Update</button>
  <div id="version">v16</div>

  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
