<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2563eb">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>Word Search</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Word Search</h1>
    <div id="level-indicator">Puzzle 1</div>
    <div id="theme-indicator"></div>
  </header>

  <div id="word-list"></div>

  <div id="grid-container">
    <div id="grid-wrapper">
      <div id="grid" aria-label="Word search grid"></div>
    </div>
  </div>

  <nav id="nav-bar">
    <button id="btn-prev" disabled>Previous</button>
    <button id="btn-next">Next Puzzle</button>
  </nav>

  <div id="overlay">
    <div class="message">
      <h2>Well Done!</h2>
      <p>Loading next puzzle...</p>
    </div>
  </div>

  <div id="confirm-dialog" class="dialog-backdrop" role="dialog" aria-modal="true">
    <div class="dialog-box">
      <p id="confirm-message">Leave this puzzle?</p>
      <div class="dialog-buttons">
        <button id="confirm-no">Cancel</button>
        <button id="confirm-yes">OK</button>
      </div>
    </div>
  </div>

  <div id="hint-dialog" class="dialog-backdrop" role="dialog" aria-modal="true">
    <div class="dialog-box">
      <p id="hint-message">Show hint for this word?</p>
      <div class="dialog-buttons">
        <button id="hint-no">Cancel</button>
        <button id="hint-yes">Show Hint</button>
      </div>
    </div>
  </div>

  <button id="btn-update">Update</button>
  <div id="version">v13</div>

  <script src="words.js"></script>
  <script src="app.js"></script>
</body>
</html>
